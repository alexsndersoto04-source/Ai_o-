name: Ciclo de Entrenamiento Autónomo con Wikipedia - Ai o

on:
  workflow_dispatch:

jobs:
  entrenar:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar el repositorio con los 5 motores
      uses: actions/checkout@v4

    - name: 2. Instalar herramientas de compilación y Python (Versión Corregida)
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ make curl python3 python3-pip git
        # Instalamos la versión más reciente directamente desde GitHub que corrige el fallo de Python 3.12
        pip3 install git+https://github.com/attardi/wikiextractor.git

    - name: 3. Descargar y Convertir Wikipedia a Texto Plano
      run: |
        echo "=== INICIANDO EXTRACCIÓN DE WIKIPEDIA ==="
        curl -L "https://dumps.wikimedia.org/eswiki/latest/eswiki-latest-pages-articles-multistream.xml.bz2" -o wikipedia_es.xml.bz2
        
        echo "=== LIMPIANDO XML Y CONVIRTIENDO A TEXTO PLANO ==="
        python3 -m wikiextractor.WikiExtractor wikipedia_es.xml.bz2 --txt -o wiki_texto_limpio
        
        cat wiki_texto_limpio/*/* > dataset_wikipedia.txt
        echo "=== TEXTO PLANO PREPARADO CON ÉXITO ==="

    - name: 4. Compilar el núcleo de Ai o
      run: |
        g++ -O3 main.cpp -o aio_control
        chmod +x aio_control

    - name: 5. Inyección de Datos en Streaming al Motor
      run: |
        echo "Iniciando entrenamiento con el dataset de Wikipedia..."
        ./aio_control dataset_wikipedia.txt
