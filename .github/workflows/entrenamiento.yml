name: Ciclo de Entrenamiento Autónomo con Wikipedia - Ai o

on:
  workflow_dispatch:

jobs:
  entrenar:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar el repositorio con los 5 motores
      uses: actions/checkout@v4

    - name: 2. Instalar herramientas de compilación
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ make curl python3 git

    - name: 3. Descargar y Convertir Wikipedia a Texto Plano
      run: |
        echo "=== INICIANDO DESCARGA DE WIKIPEDIA ==="
        curl -L "https://dumps.wikimedia.org/eswiki/latest/eswiki-latest-pages-articles-multistream.xml.bz2" -o wikipedia_es.xml.bz2
        
        echo "=== LIMPIANDO XML CON SCRIPT COMPATIBLE ==="
        python3 -c "
        import bz2, re
        print('Abriendo y procesando archivo... Esto tomará un momento.')
        with bz2.open('wikipedia_es.xml.bz2', 'rt', encoding='utf-8') as f_in, open('dataset_wikipedia.txt', 'w', encoding='utf-8') as f_out:
            for line in f_in:
                # Removemos etiquetas XML y códigos de formato usando expresiones regulares limpias
                if '<' in line or '>' in line:
                    line = re.sub(r'<[^>]+>', '', line)
                if '[[' in line:
                    line = re.sub(r'\[\[(?:[^|\]]*\|)?([^\]]+)\]\]', r'\1', line)
                line = re.sub(r'\{\{[^\}]*\}\}', '', line)
                cleaned = line.strip()
                if cleaned and not cleaned.startswith(('===', '==', '*', '#')):
                    f_out.write(cleaned + '\n')
        "
        echo "=== TEXTO PLANO PREPARADO CON ÉXITO ==="

    - name: 4. Compilar el núcleo de Ai o
      run: |
        g++ -O3 main.cpp -o aio_control
        chmod +x aio_control

    - name: 5. Inyección de Datos en Streaming al Motor
      run: |
        echo "Iniciando entrenamiento con el dataset de Wikipedia..."
        ./aio_control dataset_wikipedia.txt
