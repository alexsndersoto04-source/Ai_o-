name: Ciclo de Entrenamiento Autónomo con Wikipedia - Ai o

on:
  workflow_dispatch:

jobs:
  entrenar:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar repositorio
      uses: actions/checkout@v4

    - name: 2. Instalar compiladores eficientes
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ make curl python3 git

    - name: 3. Gestión Inteligente de Caché para Dataset
      id: cache-wikipedia
      uses: actions/cache@v4
      with:
        path: dataset_wikipedia.txt
        key: dataset-wikipedia-v1

    - name: 4. Descargar y Limpiar Wikipedia (Solo si no hay Caché)
      if: steps.cache-wikipedia.outputs.cache-hit != 'true'
      run: |
        echo "=== CACHÉ NO ENCONTRADO - DESCARGANDO WIKIPEDIA ==="
        curl -L "https://dumps.wikimedia.org/eswiki/latest/eswiki-latest-pages-articles-multistream.xml.bz2" -o wikipedia_es.xml.bz2
        
        echo "=== LIMPIANDO XML A TEXTO PLANO ==="
        python3 -c "
        import bz2, re
        with bz2.open('wikipedia_es.xml.bz2', 'rt', encoding='utf-8') as f_in, open('dataset_wikipedia.txt', 'w', encoding='utf-8') as f_out:
            for line in f_in:
                if '<' in line or '>' in line:
                    line = re.sub(r'<[^>]+>', '', line)
                if '[[' in line:
                    line = re.sub(r'\[\[(?:[^|\]]*\|)?([^\]]+)\]\]', r'\1', line)
                line = re.sub(r'\{\{[^\}]*\}\}', '', line)
                cleaned = line.strip()
                if cleaned and not cleaned.startswith(('===', '==', '*', '#')):
                    f_out.write(cleaned + '\n')
        "
        echo "=== DATASET CONFIGURADO Y GUARDADO EN CACHÉ ==="

    - name: 5. Compilar el motor definitivo de Ai o
      run: |
        g++ -O3 main.cpp -o aio_control
        chmod +x aio_control

    - name: 6. Ejecución del Entrenamiento y Escritura de Pesos
      run: |
        ./aio_control dataset_wikipedia.txt

    - name: 7. Auditoría Estricta de Archivos Finales
      run: |
        echo "=== LISTADO DE COMPROBACIÓN ==="
        ls -la

    - name: 8. Generar Enlace de Descarga de los Pesos (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Cerebro-Ai-O-Potencia-200
        path: pesos_aio_maxima_potencia.txt
        retention-days: 5
